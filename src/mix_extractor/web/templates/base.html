<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}mix-extractor{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<nav class="navbar navbar-expand-md bg-body-tertiary border-bottom">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-vinyl me-2 text-primary"></i>mix-extractor
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-house me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/library' %}active{% endif %}" href="/library">
            <i class="bi bi-music-note-list me-1"></i>Track Library
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/library' and request.query_params.get('keep_only') %}active{% endif %}"
             href="/library?keep_only=true">
            <i class="bi bi-bookmark-heart me-1"></i>Keep List
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container-fluid py-4">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
